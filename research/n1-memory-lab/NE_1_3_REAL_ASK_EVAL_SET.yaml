dataset: NE-1.3
status: canonical
principle: real asks only, sampled to preserve the lived temporal shape of NE-1.3
sampling:
  target_count: 50
  temporal_distribution:
  - window: 2026-03-07 -> 2026-03-12
    count: 4
  - window: 2026-03-13 -> 2026-03-16
    count: 11
  - window: 2026-03-17 -> 2026-03-22
    count: 9
  - window: 2026-03-23 -> 2026-03-31
    count: 11
  - window: 2026-04-01 -> 2026-04-10
    count: 15
  rules:
  - keep raw user phrasing
  - preserve bursts without letting one day dominate the whole set
  - keep repeated ask-shapes across time when the right answer changes later
  - prune near-duplicates from the same local burst
  - do not sample by local git; git is judge-side evidence only
measurement:
  headline: success_rate
  diagnostics:
  - factual_grounding
  - continuity
  efficiency_panel:
  - zero_search_success_rate
  - tool_calls_per_success
  - cost_per_success
evidence_contract:
- raw slice around the ask
- replay-time state at that moment
- run traces
- time-contained local git anchor for the judge
