services:
  synthesis:
    build:
      context: ../..
      dockerfile: experiments/sandbox/Dockerfile
    init: true
    stop_grace_period: 10s
    volumes:
      - ${FROZEN_DB:-./data/frozen.db}:/data/frozen.db:ro
      - ${OUTPUT_DIR:-./output}:/output
      - ${SKILL_FILE:-/dev/null}:/skill.md:ro
    environment:
      # LLM provider config (required)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      # Or for proxy routing
      - SYKE_PROVIDER=${SYKE_PROVIDER:-azure}
      - AZURE_API_KEY=${AZURE_API_KEY:-}
      - AZURE_API_BASE=${AZURE_API_BASE:-}
      - AZURE_API_VERSION=${AZURE_API_VERSION:-2024-10-21}
      # Run config
      - SYKE_SYNC_MODEL=${SYKE_SYNC_MODEL:-sonnet}
      - SYKE_SYNC_BUDGET=${SYKE_SYNC_BUDGET:-2.00}
      - SYKE_SYNC_MAX_TURNS=${SYKE_SYNC_MAX_TURNS:-10}
      - SYKE_SYNC_THINKING=${SYKE_SYNC_THINKING:-2000}
      # Replay config
      - REPLAY_USER_ID=${REPLAY_USER_ID:-replay}
      - REPLAY_SOURCE_USER_ID=${REPLAY_SOURCE_USER_ID:-fresh_test}
      - REPLAY_START_DAY=${REPLAY_START_DAY:-}
      - REPLAY_MAX_DAYS=${REPLAY_MAX_DAYS:-7}
    # No extra network restrictions — needs API access
    # For full isolation, use network_mode: none + external API proxy
