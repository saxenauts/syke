name: Publish to PyPI
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --extra dev --locked
      - run: uv run ruff format --check
      - run: uv run ruff check

  test:
    needs: lint
    uses: ./.github/workflows/_tests.yml

  build:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - run: uv sync --extra dev --locked
      - run: uv run python scripts/check_release_tag.py "${GITHUB_REF_NAME}"
      - run: uv run python -m build
      - run: uv run --with twine python -m twine check --strict dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: syke-dist
          path: dist/*
          if-no-files-found: error

  smoke-artifact:
    needs: [test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v7
        with:
          name: syke-dist
          path: dist
      - run: bash scripts/smoke-artifact-install.sh dist/*.whl

  publish:
    needs: smoke-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: syke-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
