spec_version = 1
source = "codex"
format_cluster = "jsonl"
status = "active"

[discover]
roots = [{ path = "~/.codex/sessions", include = ["**/rollout-*.jsonl"], priority = 20 }]

[session]
scope = "file"
id_fallback = "$file.uuid_suffix"
start_time = { first_timestamp = "timestamp" }

[turn]
match = { field = "type", values = ["response_item"] }
role_field = "payload.role"
content_parser = "extract_text_content"
timestamp_field = "timestamp"

[metadata]
fields = [
  { key = "cwd", first = "payload.cwd" },
  { key = "git_branch", first = "payload.git.branch" },
  { key = "model_provider", first = "payload.model_provider" },
]

[external_id]
template = "{source}:{session_id}:turn:{sequence_index}"
