spec_version = 1
source = "pi"
format_cluster = "jsonl"
status = "active"

[discover]
roots = [{ path = "~/.pi/agent/sessions", include = ["**/*.jsonl"], priority = 20 }]

[session]
scope = "file"
id_field = "id"
id_fallback = "$file.stem"
start_time = { first_timestamp = "timestamp" }

[turn]
match = { field = "type", values = ["message"] }
role_field = "message.role"
content_parser = "extract_text_content"
timestamp_field = "timestamp"

[metadata]
fields = [
  { key = "cwd", first = "cwd" },
  { key = "provider", first = "provider" },
  { key = "model", first = "modelId" },
]

[external_id]
template = "{source}:{session_id}:turn:{sequence_index}"
