spec_version = 1
source = "opencode"
format_cluster = "sqlite"
status = "active"

[discover]
roots = [{ path = "~/.local/share/opencode/opencode.db", include = ["opencode.db"] }]

[session]
scope = "query"
id_field = "id"
start_time = { first_timestamp = "time_created" }
parent_session_id = { field = "parent_id" }

[turn]
role_field = "role"
content_parser = "extract_text_content"
tool_parser = "extract_tool_blocks"
timestamp_field = "time.created"

[metadata]
fields = [
  { key = "directory", path = "directory" },
  { key = "title", path = "title" },
  { key = "version", path = "version" },
]

[external_id]
template = "{source}:{session_id}:turn:{sequence_index}"
