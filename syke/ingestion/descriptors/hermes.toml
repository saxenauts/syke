spec_version = 1
source = "hermes"
format_cluster = "sqlite"
status = "active"

[discover]
roots = [{ path = "~/.hermes", include = ["state.db"] }]

[session]
scope = "query"
id_field = "id"
start_time = { first_timestamp = "started_at" }

[turn]
role_field = "role"
content_parser = "extract_text_content"
timestamp_field = "timestamp"

[metadata]
fields = [
  { key = "model", path = "model" },
  { key = "title", path = "title" },
  { key = "input_tokens", path = "input_tokens" },
  { key = "output_tokens", path = "output_tokens" },
]

[external_id]
template = "{source}:{session_id}:turn:{sequence_index}"
