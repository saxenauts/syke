spec_version = 1
source = "opencode"
format_cluster = "sqlite"
status = "active"

[discover]
[[discover.roots]]
path = "~/.local/share/opencode"
include = ["opencode.db"]

[session]
scope = "query"
id_field = "id"

[turn]
role_field = "role"
content_parser = "extract_text_content"
timestamp_field = "time"
