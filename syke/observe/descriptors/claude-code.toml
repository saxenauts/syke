spec_version = 1
source = "claude-code"
format_cluster = "jsonl"
status = "active"

[discover]
[[discover.roots]]
path = "~/.claude/projects"
include = ["**/*.jsonl"]

[[discover.roots]]
path = "~/.claude/transcripts"
include = ["*.jsonl"]

[session]
scope = "file"
id_field = "id"

[turn]
role_field = "type"
content_parser = "extract_text_content"
timestamp_field = "timestamp"
